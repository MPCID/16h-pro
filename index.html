<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>16H 偵查助手 Pro - 臺北憲兵隊</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary-dark: #002366; --accent-blue: #0d6efd; }
        body { background-color: #f8f9fa; font-family: -apple-system, sans-serif; }
        .header-bg { background: linear-gradient(135deg, var(--primary-dark), var(--accent-blue)); color: white; padding: 20px 0; border-radius: 0 0 20px 25px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .container { max-width: 600px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 15px; }
        .nav-pills .nav-link { color: #666; border-radius: 10px; padding: 10px; font-size: 0.9rem; }
        .nav-pills .nav-link.active { background-color: var(--primary-dark); color: white; }
        .form-label { font-weight: 600; color: #444; font-size: 0.85rem; margin-top: 8px; }
        .btn-action { border-radius: 10px; padding: 10px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .result-area { background-color: #fff; border-radius: 12px; padding: 15px; border-left: 5px solid var(--primary-dark); font-size: 0.9rem; line-height: 1.6; }
        .law-tag { background-color: #e8f0fe; color: #1a73e8; padding: 2px 8px; border-radius: 5px; font-weight: bold; font-size: 0.75rem; }
        .time-box { background-color: #fff5f5; border: 1px solid #ffc9c9; border-radius: 8px; padding: 10px; }
    </style>
</head>
<body>

<div class="modal fade" id="disclaimerModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title fw-bold text-danger">執法程序安全聲明</h5></div>
            <div class="modal-body small">
                <p>1. 嚴禁輸入真實姓名，請使用代稱。<br>2. 本程式依據<strong>刑訴法 93-1 條</strong>設計。<br>3. 數據僅存於本地，關閉即刪除。</p>
            </div>
            <div class="modal-footer border-0"><button type="button" class="btn btn-primary w-100" data-bs-dismiss="modal">已了解並同意</button></div>
        </div>
    </div>
</div>

<div class="header-bg text-center">
    <h3 class="fw-bold mb-0">16H 偵查助手 Pro</h3>
    <p class="mb-0 small" style="opacity: 0.9;">臺北憲兵隊 數位執法專用</p>
</div>

<div class="container">
    <ul class="nav nav-pills nav-fill mb-4 bg-white p-2 border rounded-pill" id="pills-tab" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#calc-content">時限精算</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#analysis-content">偵分析</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#doc-content">公文產生</button></li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="calc-content">
            <div class="card p-3 shadow-sm">
                <h6 class="fw-bold mb-3 text-primary"><i class="bi bi-clock-history"></i> 刑事訴訟法 93-1 時限追蹤</h6>
                
                <div class="time-box mb-3">
                    <label class="form-label text-danger">逮捕/到案時間</label>
                    <input type="datetime-local" id="startTime" class="form-control form-control-sm">
                </div>

                <div class="row g-2 mb-2">
                    <div class="col-6">
                        <label class="form-label">夜間停止訊問 (小時)</label>
                        <input type="number" id="nightHours" class="form-control form-control-sm" value="0" step="0.5">
                    </div>
                    <div class="col-6">
                        <label class="form-label">解送在途時間 (小時)</label>
                        <input type="number" id="travelHours" class="form-control form-control-sm" value="0" step="0.1">
                    </div>
                </div>

                <div class="row g-2 mb-2">
                    <div class="col-6">
                        <label class="form-label">等候律師 (限4H)</label>
                        <input type="number" id="lawyerHours" class="form-control form-control-sm" value="0" max="4" step="0.1">
                    </div>
                    <div class="col-6">
                        <label class="form-label">等候通譯 (限6H)</label>
                        <input type="number" id="translatorHours" class="form-control form-control-sm" value="0" max="6" step="0.1">
                    </div>
                </div>

                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="form-label">法院提審/不可抗力</label>
                        <input type="number" id="forceHours" class="form-control form-control-sm" value="0" step="0.1">
                    </div>
                    <div class="col-6">
                        <label class="form-label">提審告知時間</label>
                        <input type="datetime-local" id="noticeTime" class="form-control form-control-sm">
                    </div>
                </div>

                <button class="btn btn-primary btn-action w-100" onclick="calculate931()">
                    <i class="bi bi-calculator-fill"></i> 執行法定時限精算
                </button>
                
                <div id="cRes" class="mt-3 result-area" style="display:none; border-left-color: #d32f2f;"></div>
            </div>
        </div>

        <div class="tab-pane fade" id="analysis-content">
            <div class="card p-3 shadow-sm">
                <h6 class="fw-bold mb-3 text-warning"><i class="bi bi-search"></i> 案情框架與構成要件分析</h6>
                <textarea id="caseBrief" class="form-control mb-3" rows="4" placeholder="請描述案情事實（例：A男於凌晨毀越門窗進入辦公室竊取電腦...）"></textarea>
                <button class="btn btn-warning btn-action text-dark w-100" onclick="proAnalyze()">
                    <i class="bi bi-journal-text"></i> 分析法條與重點
                </button>
                <div id="aRes" class="mt-3 result-area" style="display:none; background-color: #fcfdfd;"></div>
            </div>
        </div>

        <div class="tab-pane fade" id="doc-content">
            <div class="card p-3 shadow-sm">
                <h6 class="fw-bold mb-3 text-success"><i class="bi bi-file-earmark-text"></i> 臺北憲兵隊 調閱公文</h6>
                <input type="text" id="commN" class="form-control mb-2" placeholder="社區管理委員會名稱">
                <input type="text" id="cPos" class="form-control mb-3" placeholder="鏡頭位置 (如：地下車道)">
                <button class="btn btn-success btn-action w-100" onclick="genDoc()">
                    <i class="bi bi-printer"></i> 生成公文
                </button>
                <div id="dRes" class="mt-3" style="display:none;">
                    <div id="dBody" class="p-3 border bg-white small rounded" style="white-space: pre-wrap; font-family: serif; font-size: 0.85rem;"></div>
                    <button class="btn btn-outline-primary btn-sm w-100 mt-2" onclick="copyC('dBody')">複製內容</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    window.onload = function() { new bootstrap.Modal(document.getElementById('disclaimerModal')).show(); };

    function calculate931() {
        const start = new Date(document.getElementById('startTime').value);
        if (isNaN(start)) return alert("請輸入逮捕時間");

        const night = parseFloat(document.getElementById('nightHours').value) || 0;
        const travel = parseFloat(document.getElementById('travelHours').value) || 0;
        const lawyer = Math.min(parseFloat(document.getElementById('lawyerHours').value) || 0, 4);
        const trans = Math.min(parseFloat(document.getElementById('translatorHours').value) || 0, 6);
        const force = parseFloat(document.getElementById('forceHours').value) || 0;

        const totalDeduct = night + travel + lawyer + trans + force;
        const deadline = new Date(start.getTime() + (16 + totalDeduct) * 3600000);
        const suggest = new Date(deadline.getTime() - 7200000);

        document.getElementById('cRes').innerHTML = `
            <div class="law-tag mb-2">依刑事訴訟法第 93-1 條計算</div>
            總扣除時間：<b class="text-primary">${totalDeduct.toFixed(1)}</b> 小時<br>
            建議移送時間：<b>${suggest.toLocaleString()}</b><br>
            <span class="text-danger fw-bold">法律解送底線：${deadline.toLocaleString()}</span>
            <hr><small class="text-muted">※ 已依規限制等候律師上限4H、通譯上限6H。</small>
        `;
        document.getElementById('cRes').style.display = 'block';
    }

    function proAnalyze() {
        const text = document.getElementById('caseBrief').value;
        if (!text) return alert("請輸入案情");
        let res = "";
        
        if (text.includes("毀") || text.includes("越") || text.includes("牆") || text.includes("門")) {
            res = `<div class="law-tag">適用：刑法第 321 條 (加重竊盜)</div><hr><b>【構成要件】</b><br>1. 毀越門窗安全設備。<br>2. 侵入住宅或有人居住之建築物。<br>3. 具備不法所有意圖與竊取行為。<br><b>【詢問重點】</b><br>如何進入？有無攜帶兇器？`;
        } else {
            res = `<div class="law-tag">適用：一般偵查程序</div><hr><b>【分析範疇】</b><br>1. 主觀犯意與客觀行為之連結。<br>2. 刑訴法第 95 條告知義務。<br>3. 證據鏈之完整性檢視。`;
        }
        document.getElementById('aRes').innerHTML = res;
        document.getElementById('aRes').style.display = 'block';
    }

    function genDoc() {
        const y = new Date().getFullYear() - 1911;
        const t = `臺北憲兵隊 函\n發文日期：中華民國 ${y} 年 ${new Date().getMonth()+1} 月 ${new Date().getDate()} 日\n\n主旨：協助提供影像及名單。\n說明：本隊辦案需要，依刑訴法及個資法辦理。正本：${document.getElementById('commN').value}管委會`;
        document.getElementById('dBody').innerText = t;
        document.getElementById('dRes').style.display = 'block';
    }

    function copyC(id) { navigator.clipboard.writeText(document.getElementById(id).innerText); alert("已複製"); }
</script>
</body>
</html>
