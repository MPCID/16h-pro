<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能偵詢要領智慧輔助系統 | 全功能發佈版</title>
    <!-- 引入外部資源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-effect { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        /**
         * 修正後的圖標組件
         * 使用 ref 確保 Lucide 只修改特定的 DOM 節點，避免 React 產生 removeChild 錯誤
         */
        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);

            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        attrs: {
                            width: size,
                            height: size,
                            class: className
                        },
                        root: containerRef.current
                    });
                }
            }, [name, size, className]);

            return <span ref={containerRef} className="inline-flex items-center justify-center" />;
        };

        const App = () => {
            const [apiKey, setApiKey] = useState(localStorage.getItem('AIzaSyA8dZu8fy_2QOUnrMcQEy0QWshfGxw-wiI') || "");
            const [showSettings, setShowSettings] = useState(!localStorage.getItem('gemini_api_key'));
            const [images, setImages] = useState({});
            const [imgLoading, setImgLoading] = useState({});
            const [aiInput, setAiInput] = useState("");
            const [aiResult, setAiResult] = useState(null);
            const [isAiProcessing, setIsAiProcessing] = useState(false);
            const [errorMsg, setErrorMsg] = useState("");

            // Gemini API 呼叫 (含退避重試)
            const callGemini = async (userQuery, systemPrompt, retries = 5, delay = 1000) => {
                const currentKey = apiKey || ""; // 優先使用使用者設定的 Key
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${currentKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: userQuery }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || "API 請求失敗");
                    }
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (e) {
                    if (retries > 0) {
                        await new Promise(r => setTimeout(r, delay));
                        return callGemini(userQuery, systemPrompt, retries - 1, delay * 2);
                    }
                    throw e;
                }
            };

            const handleAiAnalyze = async () => {
                if (!apiKey) {
                    setShowSettings(true);
                    return;
                }
                if (!aiInput.trim()) return;
                setIsAiProcessing(true);
                setAiResult(null);
                setErrorMsg("");
                const systemPrompt = `你是一位專業的司法警察偵訊導師。針對案情提供：1.構成要件分析 2.詢問策略(5個Q&A) 3.程序提醒。使用繁體中文並搭配 emoji。`;
                try {
                    const text = await callGemini(aiInput, systemPrompt);
                    setAiResult(text);
                } catch (e) {
                    setErrorMsg("連線失敗：" + e.message);
                } finally {
                    setIsAiProcessing(false);
                }
            };

            const generateImage = useCallback(async (id, promptText, keyOverride) => {
                const currentKey = keyOverride || apiKey;
                if (!currentKey) return;

                setImgLoading(prev => ({ ...prev, [id]: true }));
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${currentKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            instances: { prompt: `${promptText}, professional law enforcement style, high quality` },
                            parameters: { sampleCount: 1 }
                        })
                    });
                    const result = await response.json();
                    if (result.predictions?.[0]) {
                        setImages(p => ({ ...p, [id]: `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}` }));
                    }
                } catch (e) {
                    console.error(e);
                } finally {
                    setImgLoading(p => ({ ...p, [id]: false }));
                }
            }, [apiKey]);

            const saveSettings = (key) => {
                localStorage.setItem('gemini_api_key', key);
                setApiKey(key);
                setShowSettings(false);
                setErrorMsg("");
                // 重新觸發圖片生成
                initImages(key);
            };

            const initImages = (key) => {
                generateImage('legal', 'Justice scales icon blue', key);
                generateImage('room', 'Modern interrogation room setup', key);
                generateImage('record', 'Police investigation folder', key);
            };

            useEffect(() => {
                if (apiKey) initImages(apiKey);
            }, []);

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center">
                    {/* Header */}
                    <header className="max-w-6xl w-full mb-10 text-center animate-fade-in relative">
                        <div className="absolute right-0 top-0">
                             <button 
                                onClick={() => setShowSettings(true)}
                                className="flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 rounded-xl text-xs font-bold hover:bg-slate-50 shadow-sm transition-all"
                            >
                                <Icon name="settings" size={14} /> 系統設定
                            </button>
                        </div>
                        <div className="inline-flex items-center gap-2 bg-blue-600 text-white px-4 py-1.5 rounded-full text-xs font-bold mb-4 shadow-lg">
                            <Icon name="shield-check" size={14} /> 臺北憲兵隊司法警察實務訓練素材
                        </div>
                        <h1 className="text-3xl md:text-4xl font-black text-slate-900 mb-4 tracking-tight">偵詢要領智慧輔助平台</h1>
                        <p className="text-slate-500 max-w-2xl mx-auto text-sm">
                            整合實務手冊之構成要件，運用 ✨ AI 進行智能研析與策略引導。
                        </p>
                    </header>

                    {/* 設定視窗 */}
                    {showSettings && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-md p-10 animate-fade-in">
                                <h3 className="text-2xl font-black mb-2 flex items-center gap-3 text-slate-900">
                                    <Icon name="key" className="text-blue-600" /> AI 服務設定
                                </h3>
                                <p className="text-slate-500 text-sm mb-8">請輸入您的 Google API 金鑰以啟用聯網 AI 功能。金鑰將儲存在您的瀏覽器中。</p>
                                <input 
                                    type="password"
                                    className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl mb-6 focus:border-blue-500 outline-none text-sm shadow-inner"
                                    placeholder="在此貼上您的 API Key..."
                                    defaultValue={apiKey}
                                    id="key-input"
                                />
                                <div className="flex gap-4">
                                    <button 
                                        onClick={() => saveSettings(document.getElementById('key-input').value)}
                                        className="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-black shadow-xl hover:bg-blue-700 transition-all"
                                    >儲存設定</button>
                                    <button 
                                        onClick={() => setShowSettings(false)}
                                        className="px-6 py-4 border-2 border-slate-100 rounded-2xl font-black text-slate-400 hover:bg-slate-50 transition-all"
                                    >取消</button>
                                </div>
                                <div className="mt-8 pt-6 border-t border-slate-50 text-center">
                                    <a href="https://aistudio.google.com/" target="_blank" className="text-[10px] font-bold text-blue-500 hover:underline uppercase tracking-widest">尚未取得金鑰？點此前往申請</a>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-3 gap-8">
                        {/* 左側：AI 工作台 */}
                        <div className="lg:col-span-1 space-y-8 animate-fade-in">
                            <section className="bg-white rounded-2xl shadow-xl border border-blue-100 overflow-hidden">
                                <div className="bg-gradient-to-r from-blue-700 to-indigo-800 p-5 text-white">
                                    <div className="flex items-center gap-2 font-bold">
                                        <Icon name="sparkles" className="text-yellow-400" /> ✨ 智能偵詢助手
                                    </div>
                                    <p className="text-blue-100 text-[10px] mt-1">輸入案情摘要，獲取專業分析與詢問建議</p>
                                </div>
                                <div className="p-6">
                                    <textarea 
                                        className="w-full h-40 p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all resize-none shadow-inner"
                                        placeholder="請輸入案情概要，例如：某兵在營區簽賭被查獲，其手機存有簽賭紀錄..."
                                        value={aiInput}
                                        onChange={(e) => setAiInput(e.target.value)}
                                    />
                                    <button 
                                        onClick={handleAiAnalyze}
                                        disabled={isAiProcessing || !aiInput}
                                        className={`w-full mt-4 py-3 rounded-xl flex items-center justify-center gap-2 font-bold text-sm transition-all shadow-lg ${
                                            isAiProcessing ? 'bg-slate-200 text-slate-400' : 'bg-blue-600 text-white hover:bg-blue-700 active:scale-95'
                                        }`}
                                    >
                                        {isAiProcessing ? <Icon name="loader-2" className="animate-spin" /> : <Icon name="brain-circuit" />}
                                        {isAiProcessing ? "AI 分析中..." : "開始智慧研析"}
                                    </button>

                                    {errorMsg && (
                                        <div className="mt-4 p-3 bg-red-50 text-red-600 text-xs rounded-xl border border-red-100 font-medium">
                                            {errorMsg}
                                        </div>
                                    )}

                                    {aiResult && (
                                        <div className="mt-6 p-4 bg-indigo-50 rounded-2xl border border-indigo-100 text-sm leading-relaxed whitespace-pre-wrap max-h-96 overflow-y-auto custom-scrollbar">
                                            <div className="font-bold text-indigo-900 mb-2 flex items-center gap-2">
                                                <Icon name="book-open" size={16} /> 分析結果：
                                            </div>
                                            {aiResult}
                                        </div>
                                    )}
                                </div>
                            </section>

                            <section className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                                <div className="flex items-center gap-2 mb-4 font-bold text-slate-800 text-sm">
                                    <Icon name="scale" className="text-blue-600" /> 權利告知 (刑訴95)
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    {['告知罪名', '保持緘默', '選任辯護', '有利證據'].map(t => (
                                        <div key={t} className="text-[10px] bg-slate-50 p-2 rounded-lg font-bold text-slate-600 flex items-center gap-1">
                                            <div className="w-1 h-1 bg-blue-500 rounded-full"></div>{t}
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>

                        {/* 右側：詳細資訊 */}
                        <div className="lg:col-span-2 space-y-8 animate-fade-in" style={{animationDelay: '0.2s'}}>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <section className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                    <div className="h-40 bg-slate-100 flex items-center justify-center relative overflow-hidden">
                                        {images.room ? <img src={images.room} className="w-full h-full object-cover" /> : <Icon name="camera" size={40} className="text-slate-300" />}
                                        {imgLoading.room && <div className="absolute inset-0 bg-white/50 flex items-center justify-center text-[10px] text-slate-400 font-bold uppercase tracking-widest animate-pulse">AI Generating</div>}
                                    </div>
                                    <div className="p-5">
                                        <h3 className="font-bold text-sm mb-3 flex items-center gap-2 text-slate-900">
                                            <Icon name="camera" size={18} className="text-blue-600" /> 偵訊環境配置
                                        </h3>
                                        <ul className="text-[11px] space-y-2 text-slate-500">
                                            <li>• 全程監錄：球型、定點雙重錄影</li>
                                            <li>• 安全設施：吸音壁、固定式手銬軌道</li>
                                            <li>• 程序標準：時鐘、身高板、防疫隔板</li>
                                        </ul>
                                    </div>
                                </section>

                                <section className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                    <div className="h-40 bg-slate-100 flex items-center justify-center relative overflow-hidden">
                                        {images.record ? <img src={images.record} className="w-full h-full object-cover" /> : <Icon name="file-text" size={40} className="text-slate-300" />}
                                        {imgLoading.record && <div className="absolute inset-0 bg-white/50 flex items-center justify-center text-[10px] text-slate-400 font-bold uppercase tracking-widest animate-pulse">AI Generating</div>}
                                    </div>
                                    <div className="p-5">
                                        <h3 className="font-bold text-sm mb-3 flex items-center gap-2 text-slate-900">
                                            <Icon name="alert-triangle" size={18} className="text-red-600" /> 筆錄致命缺失
                                        </h3>
                                        <div className="p-3 bg-red-50 rounded-xl text-[10px] text-red-700 font-medium">
                                            ⚠️ 內容空洞：漏問構成要件關鍵動機<br/>
                                            ⚠️ 程序違法：夜訊限制或漏作權利告知<br/>
                                            ⚠️ 錯別字：造成事實認定矛盾，影響定罪
                                        </div>
                                    </div>
                                </section>
                            </div>

                            <section className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <div className="p-4 bg-slate-50 border-b border-slate-100 flex items-center gap-2 font-bold text-xs uppercase tracking-wider">
                                    <Icon name="clock" size={14} className="text-blue-600" /> 標準偵詢作業程序 (SOP)
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3">
                                    <div className="p-6 border-b md:border-b-0 md:border-r border-slate-100">
                                        <div className="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-black text-xs mb-3">01</div>
                                        <h4 className="font-bold text-xs mb-2 text-slate-800">偵訊前：準備</h4>
                                        <p className="text-[10px] text-slate-500">擬定要點、身分核對、受詢人身心確認。</p>
                                    </div>
                                    <div className="p-6 border-b md:border-b-0 md:border-r border-slate-100 bg-blue-50/20">
                                        <div className="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center font-black text-xs mb-3">02</div>
                                        <h4 className="font-bold text-xs mb-2 text-slate-800 uppercase italic">案重初供</h4>
                                        <p className="text-[10px] text-slate-500">隔離偵訊、追查共犯、全程錄音錄影。</p>
                                    </div>
                                    <div className="p-6">
                                        <div className="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-black text-xs mb-3">03</div>
                                        <h4 className="font-bold text-xs mb-2 text-slate-800">偵訊後：確認</h4>
                                        <p className="text-[10px] text-slate-500">命親自審閱與朗讀、確認增刪與捺印。</p>
                                    </div>
                                </div>
                            </section>

                            <section className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
                                <h3 className="font-bold text-sm mb-6 flex items-center gap-2 text-slate-900 uppercase tracking-wider">
                                    <Icon name="check-circle" size={16} className="text-blue-600" /> 案類偵辦檢查點 (Checkpoints)
                                </h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {[
                                        { t: '毒品案件 (軍人尿篩)', d: '重點：監管鏈完整、感冒藥處方查證、鑑定閾值確認。' },
                                        { t: '竊盜案件 (營內外)', d: '重點：監視畫面比對、排除借用可能、行竊具體時間。' },
                                        { t: '職責案 (施暴侮辱)', d: '重點：職權關係確認、公然性要件、驗傷單證明。' },
                                        { t: '職役案件 (逃兵)', d: '重點：長期脫免意圖、通報時效、返營主觀意願。' },
                                    ].map(item => (
                                        <div key={item.t} className="p-4 bg-slate-50 rounded-xl hover:shadow-md transition-all border border-transparent hover:border-blue-100 group">
                                            <h4 className="text-xs font-bold text-blue-800 mb-1 group-hover:text-blue-600 uppercase tracking-tight">{item.t}</h4>
                                            <p className="text-[10px] text-slate-500 leading-relaxed font-medium">{item.d}</p>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>
                    </div>

                    <footer className="mt-12 text-center text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em] border-t border-slate-100 pt-8 w-full max-w-6xl">
                        © 2026 TPMP Intelligent Framework | AI Core: Gemini Flash
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
