<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>16H 偵查助手 Pro - 臺北憲兵隊</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary-dark: #002366; --accent-blue: #0d6efd; --military-gold: #c5a059; }
        body { background-color: #f4f7f6; font-family: -apple-system, "Microsoft JhengHei", sans-serif; }
        .header-bg { background: linear-gradient(135deg, var(--primary-dark), var(--accent-blue)); color: white; padding: 20px 0; border-radius: 0 0 20px 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .container { max-width: 650px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 15px; }
        .nav-pills .nav-link { color: #666; border-radius: 10px; padding: 10px; font-weight: bold; }
        .nav-pills .nav-link.active { background-color: var(--primary-dark); color: white; }
        .result-area { background-color: #fff; border-radius: 12px; padding: 20px; border-left: 6px solid var(--primary-dark); line-height: 1.8; font-size: 0.9rem; }
        .analysis-title { color: var(--primary-dark); border-bottom: 2px solid var(--military-gold); padding-bottom: 5px; margin-top: 15px; font-weight: bold; font-size: 1rem; }
        .q-box { background-color: #f8f9fa; border-radius: 8px; padding: 12px; margin-top: 10px; border: 1px dashed #ccc; }
        .law-highlight { background-color: #eef2ff; color: #1e40af; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="modal fade" id="disclaimerModal" data-bs-backdrop="static" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
            <div class="modal-header border-0 mt-2"><h5 class="modal-title fw-bold text-danger"><i class="bi bi-shield-lock-fill"></i> 執法資安規範聲明</h5></div>
            <div class="modal-body small text-secondary">1. 嚴禁輸入真實姓名。<br>2. 本程式依據刑訴法 93-1 條設計。<br>3. 數據採本地加密運算，不留存、不紀錄。</div>
            <div class="modal-footer border-0"><button type="button" class="btn btn-primary w-100 fw-bold" data-bs-dismiss="modal">遵照規範使用</button></div>
        </div>
    </div>
</div>

<div class="header-bg text-center">
    <h3 class="fw-bold mb-0">16H 偵查助手 Pro</h3>
    <p class="mb-0 small">臺北憲兵隊 專業偵訊輔助系統</p>
</div>

<div class="container">
    <ul class="nav nav-pills nav-fill mb-4 bg-white p-2 border rounded-pill shadow-sm">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#calc-content">時限精算</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#analysis-content">偵訊導師</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#doc-content">調閱公文</button></li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="calc-content">
            <div class="card p-4 shadow-sm">
                <h6 class="fw-bold mb-3 text-primary border-bottom pb-2">刑訴法 93-1 障礙時限</h6>
                <label class="form-label text-danger fw-bold">逮捕/到案時間</label>
                <input type="datetime-local" id="startTime" class="form-control mb-3">
                <div class="p-3 bg-light rounded-3 mb-3">
                    <label class="form-label text-primary">法定障礙時間累計：</label>
                    <div class="row g-2">
                        <div class="col-6">
                            <div class="input-group input-group-sm">
                                <input type="number" id="dH" class="form-control" placeholder="0"><span class="input-group-text">小時</span>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="input-group input-group-sm">
                                <input type="number" id="dM" class="form-control" placeholder="0"><span class="input-group-text">分鐘</span>
                            </div>
                        </div>
                    </div>
                </div>
                <button class="btn btn-primary w-100 fw-bold" onclick="calc931()">執行精算</button>
                <div id="cRes" class="mt-4 result-area" style="display:none;"></div>
            </div>
        </div>

        <div class="tab-pane fade" id="analysis-content">
            <div class="card p-4 shadow-sm">
                <h6 class="fw-bold mb-3 text-warning"><i class="bi bi-cpu-fill"></i> 智慧筆錄製作與法律分析</h6>
                <textarea id="caseBrief" class="form-control mb-3" rows="4" placeholder="輸入案情（例：蔡員毆打下士官兵...）"></textarea>
                <button class="btn btn-warning w-100 fw-bold shadow-sm" onclick="mentorAnalyze()">啟動智慧導師分析</button>
                <div id="aRes" class="mt-4 result-area" style="display:none;"></div>
            </div>
        </div>

        <div class="tab-pane fade" id="doc-content">
            <div class="card p-4 shadow-sm">
                <h6 class="fw-bold mb-3 text-success">臺北憲兵隊 調閱公文產生</h6>
                <input type="text" id="commN" class="form-control mb-2" placeholder="社區/單位名稱">
                <input type="text" id="cPos" class="form-control mb-3" placeholder="調閱範圍 (如：監視器影像)">
                <button class="btn btn-success w-100 fw-bold" onclick="genDoc()">生成公文</button>
                <div id="dRes" class="mt-4"><div id="dBody" class="p-3 border bg-white small rounded shadow-sm" style="white-space: pre-wrap; font-family: serif;"></div></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    window.onload = function() { new bootstrap.Modal(document.getElementById('disclaimerModal')).show(); };

    function calc931() {
        const s = new Date(document.getElementById('startTime').value);
        if (isNaN(s)) return alert("請輸入時間");
        const h = parseInt(document.getElementById('dH').value) || 0;
        const m = parseInt(document.getElementById('dM').value) || 0;
        const dl = new Date(s.getTime() + (16 * 60 + h * 60 + m) * 60000);
        document.getElementById('cRes').innerHTML = `障礙扣除：${h}時${m}分<br>法律底線：<b class="text-danger">${dl.toLocaleString()}</b>`;
        document.getElementById('cRes').style.display = 'block';
    }

    function mentorAnalyze() {
        const text = document.getElementById('caseBrief').value;
        if (!text) return alert("請輸入內容");
        
        let lawInfo = { title: "一般案件", code: "刑事訴訟法", elements: "需視具體個案判定。", questions: ["Q1：事實經過？","Q2：動機？"] };

        // 偵查與法規融合邏輯
        if (text.includes("打") || text.includes("毆") || text.includes("傷")) {
            lawInfo = {
                title: "普通傷害罪",
                code: "刑法第 277 條、陸海空軍刑法第 76 條第 1 項第 1 款",
                elements: "1. <b>主觀：</b>具備傷害之故意。<br>2. <b>客觀：</b>實施毆打行為導致受詢問人受有身體或健康之傷害。<br>3. <b>身分：</b>上對下之毆打可能涉及軍事體制紀律。",
                questions: [
                    "<b>Q1：</b>你與被害人是否有何嫌隙？為何實施毆打？",
                    "<b>Q2：</b>你當時是用徒手還是持械毆打？毆打部位為何？",
                    "<b>Q3：</b>當時是否有其他人在場目擊？被害人受傷程度你是否知悉？"
                ]
            };
        } else if (text.includes("竊") || text.includes("拿") || text.includes("偷")) {
            lawInfo = {
                title: "普通竊盜罪",
                code: "刑法第 320 條、陸海空軍刑法第 76 條第 1 項第 8 款",
                elements: "1. <b>主觀：</b>不法所有意圖。<br>2. <b>客觀：</b>破壞他人持有，建立自己持有。",
                questions: ["<b>Q1：</b>是否未經同意取得？","<b>Q2：</b>物品現位於何處？"]
            };
        }

        let content = `
            <div class="text-center fw-bold text-primary mb-3">✨ 偵訊導師智慧指引 ✨</div>
            你好！針對此案，我根據《偵詢要領手冊》及相關法律規範為你整理如下：
            <div class="analysis-title">1. ✨ 構成要件分析：【${lawInfo.title}】</div>
            本案涉及 <span class="law-highlight">${lawInfo.code}</span>：
            <div class="mt-2 small">${lawInfo.elements}</div>
            <div class="analysis-title">2. ✨ 詢問策略：關鍵 Q&A</div>
            <div class="q-box">
                ${lawInfo.questions.map(q => `<div class="mb-2">${q}</div>`).join('')}
            </div>
            <div class="analysis-title">3. ✨ 程序正義提醒</div>
            <ul class="small mt-2">
                <li><b>刑訴 95 條：</b>告知義務必須完整，否則筆錄無證據能力。</li>
                <li><b>軍事通報：</b>現役軍人案件應通知所屬部隊長官或監察。</li>
            </ul>
        `;
        document.getElementById('aRes').innerHTML = content;
        document.getElementById('aRes').style.display = 'block';
    }

    function genDoc() {
        const t = `臺北憲兵隊 函\n主旨：協助調閱監視器。\n正本：${document.getElementById('commN').value}`;
        document.getElementById('dBody').innerText = t;
    }
</script>
</body>
</html>
